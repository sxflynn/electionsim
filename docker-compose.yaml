services:
  fastapi-backend:
    build:
      context: ./backend/
      dockerfile: ./Dockerfile
    ports:
      - "8000:8000"
    networks:
      - electionsim-network

  react-frontend:
    build:
      context: ./frontend/
      dockerfile: ./Dockerfile
    ports:
      - "5173:5173"
    networks:
      - electionsim-network

networks:
  electionsim-network:
    driver: bridge